<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Table</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.table-box{
    width:90%;
    max-width:900px;
    background:#1e293b;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.table-title{
    background:#0ea5e9;
    padding:15px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#334155;
    padding:15px;
    font-size:16px;
}

td{
    padding:14px;
    text-align:center;
    border-bottom:1px solid #475569;
}

tr:hover{
    background:#273549;
    transition:0.3s;
}

.team{
    display:flex;
    align-items:center;
    gap:10px;
    justify-content:center;
}

.rank{
    font-weight:bold;
    color:#38bdf8;
}
</style>
</head>

<body>

<div class="table-box">

    <div class="table-title">Champions League Table</div>
    <table border="1">
  <tr>
    <th>التاريخ</th>
    <th>الفريق الأول</th>
    <th>النتيجة</th>
    <th>الفريق الثاني</th>
    <th>الحالة</th>
  </tr>

  <tr>
    <td>28 Apr 2026</td>
    <td>باريس سان جيرمان</td>
    <td>5 - 4</td>
    <td>بايرن ميونخ</td>
    <td>انتهت</td>
  </tr>

  <tr>
    <td>29 Apr 2026</td>
    <td>أتلتيكو مدريد</td>
    <td>1 - 1</td>
    <td>أرسنال</td>
    <td>انتهت</td>
  </tr>

  <tr>
    <td>05 May 2026</td>
    <td>أرسنال</td>
    <td>VS</td>
    <td>أتلتيكو مدريد</td>
    <td>القادمة</td>
  </tr>

  <tr>
    <td>06 May 2026</td>
    <td>بايرن ميونخ</td>

</table>
