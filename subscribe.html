<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscribe</title>

<style>
body{
margin:0;background:#020617;color:white;
display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial
}

.box{
background:#0f172a;padding:20px;border-radius:15px;width:80%;text-align:center;border:1px solid #1e293b
}

button{
width:100%;padding:10px;background:#22c55e;border:none;color:white;border-radius:10px;font-size:16px;cursor:pointer

.msg{margin-top:15px;color:#94a3b8;line-height:1.6}
</style>
</head>
<body>

<div class="box">
<h2>اشتراك VIP</h2>
<p>5 جنيه فقط</p>

<button onclick="go()">اشترك الآن</button>

<div class="msg" id="msg"></div>
</div>

<script>
function go(){
localStorage.setItem("pending","true");

window.open(
"https://docs.google.com/forms/d/e/1FAIpQLSeSXhIMEeTLFu0V1pmtlKK8i05m4WUcAhIdbWxRMCTKLQaB0g/viewform?usp=header",

);
}

window.onload=function(){
if(localStorage.getItem("pending") === "true"){

"سيتم ارسال لك على البريد الاكتروني الخاص بالموقع <br><br> شكرا على موافقتك بنا ❤️";
localStorage.removeItem("pending");
}
}
</script>

</body>
