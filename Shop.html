];

// 🎒 الانفنتوري
let owned = JSON.parse(localStorage.getItem("owned")) || [];

// 💰 فلوس متجمعة
let pendingCoins = JSON.parse(localStorage.getItem("pendingCoins")) || {};

let shop = document.getElementById("shop");
let inventory = document.getElementById("inventory");
let packs = document.getElementById("packs");

function hideAll(){ 
  shop.style.display="none"; 
  inventory.style.display="none"; 
  packs.style.display="none"; 
}

// 🛒 الشوب
function showShop(){
  hideAll();
  let html="";
  players.forEach(p=>{
    html+=`
    <div class="card">
      <img src="${p.img}" class="player-img"/>
      <h4>${p.name}</h4>
      <p>💰 ${p.price}</p>
      <span class="rarity ${p.rarity}">${p.rarity}</span><br>
      <button class="buy-btn" onclick="buy('${p.name}',${p.price})">
        ${owned.includes(p.name)?"Owned":"Buy"}
      </button>
    </div>`;
  });
  shop.style.display="grid";
  shop.innerHTML=html;
}

// 💸 شراء
function buy(name,price){
  if(owned.includes(name)){ alert("معاك اللاعب ده!"); return; }

  if(points>=price){
    points-=price;
    owned.push(name);
    pendingCoins[name]=0;

    localStorage.setItem("points",points);
    localStorage.setItem("owned",JSON.stringify(owned));
    localStorage.setItem("pendingCoins",JSON.stringify(pendingCoins));

    document.getElementById("points").innerText=points;
    alert("🔥 اشتريت " + name);

    showShop();
  } else { alert("نقاطك قليلة ❌"); }
}

// 🎒 الانفنتوري
function showInventory(){
  hideAll();
  let html="";

  if(owned.length===0){
    html="<h3>مفيش لاعيبة 😢</h3>";
  } else{
    owned.forEach(name=>{
      let p=players.find(pl=>pl.name===name);
      let collected = pendingCoins[name] || 0;

      html+=`
      <div class="card">
        <img src="${p.img}" class="player-img"/>
        <h4>${p.name}</h4>
        <span class="rarity ${p.rarity}">${p.rarity}</span>
        <p>💸 متجمع: ${collected}</p>
        <button class="buy-btn" onclick="claim('${p.name}')">Claim</button>
      </div>`;
    });
  }

  inventory.style.display="grid";
  inventory.innerHTML=html;
}

// 💰 Claim
function claim(name){
  let amount = pendingCoins[name] || 0;

  if(amount<=0){
    alert("مفيش فلوس 😢");
    return;
  }

  points += amount;
  pendingCoins[name] = 0;

  localStorage.setItem("points",points);
  localStorage.setItem("pendingCoins",JSON.stringify(pendingCoins));

  document.getElementById("points").innerText=points;

  alert("🔥 خدت " + amount);

  showInventory();
}

// ⏱️ سيستم الربح كل 3 ثواني
setInterval(()=>{
  owned.forEach(name=>{
    let player = players.find(p=>p.name===name);
    if(!player) return;

    let income = incomeRates[player.rarity];

    pendingCoins[name] += income;
  });

  localStorage.setItem("pendingCoins",JSON.stringify(pendingCoins));

  if(inventory.style.display==="grid"){
    showInventory();
  }

},3000);

// 🚀 تشغيل
showShop();
</script>
