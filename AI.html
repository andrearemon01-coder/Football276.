<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Football 276 AI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* شاشة اختيار الصوت */
.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:#020617;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999;
}
.overlay h2 {margin-bottom:20px;}
.overlay button {
  padding:15px 25px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* الهيدر */
header {
  text-align:center;
  padding:15px;
  background:#020617;
  font-size:22px;
  font-weight:bold;
  position:relative;
}

/* زرار الصوت */
.mute-btn {
  position:absolute;
  right:15px;
  top:10px;
  font-size:24px;
  background:#111827;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
}

/* الشات */
.chat {
  flex:1;
  overflow-y:auto;
  padding:10px;
}
.msg {
  padding:10px;
  margin:5px;
  border-radius:10px;
  max-width:80%;
  white-space:pre-line;
}
.user {
  background:#2563eb;
  margin-left:auto;
}
.bot {
  background:#374151;
}

/* الإدخال */
.input-area {
  display:flex;
  padding:10px;
}
input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
}
button.send {
  padding:10px;
  margin-left:5px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- اختيار الصوت -->
<div class="overlay" id="overlay">
  <h2>اختار الصوت 🎤</h2>
  <button onclick="setVoice('male')">👨 صوت ولد</button>
  <button onclick="setVoice('female')">👩 صوت بنت</button>
</div>

<header>
⚽ Football 276 AI
<div class="mute-btn" onclick="toggleMute()" id="muteBtn">🔊</div>
</header>

<div class="chat" id="chat"></div>

<div class="input-area">
  <input id="input" placeholder="اكتب سؤالك...">
  <button class="send" onclick="send()">إرسال</button>
</div>

<script>
let selectedVoice = null;
let isMuted = false;

const qa = [
{ q: ["الدوري الاسباني"], a: "من اقوى الدوريات حاليا وفي الصداره البرسا" },
{ q: ["الدوري المصري"], a: "من اشهر الدوريات العربية 😅" },
{ q: ["لاميين يامال"], a: "لاعب شاب موهوب في برشلونة 🔥" },
{ q: ["بيدري"], a: "لاعب في برشلونة ومنتخب اسبانيا 🇪🇸" },
{ q: ["ارجنتين"], a: "بطلة كاس العالم 2022 🇦🇷" },
{ q: ["فرنسا"], a: "بطلة كاس العالم 2018 🇫🇷" },
{ q: ["صلاح","محمد صلاح"], a: "فخر العرب 🇪🇬🔥" },
{ q: ["بينزما"], a: "لاعب فرنسي مميز ⚽" },
{ q: ["كين"], a: "مهاجم قوي 🔥" },
{ q: ["فيني"], a: "نجم ريال مدريد ⚡" },
{ q: ["دي بروين"], a: "نجم مانشستر سيتي 🎯" },
{ q: ["مودريتش"], a: "اسطورة كرواتيا 🇭🇷" },
{ q: ["جافي"], a: "موهبة برشلونة 💙❤️" },

{ q: ["احدث الاخبار"], a: "لا يوجد اخبار جديدة حالياً 📰" },
{ q: ["احدث انتقالات"], a: "السوق هادي حالياً 😅" },

{ q: ["دوري ابطال اوروبا"], a: `احدث النتائج:
البايرن 2-1 ريال مدريد
اتلتيكو 2-0 برشلونة
ارسنال 1-0 سبورتنج
باريس 2-0 ليفربول` },

{ q: ["ميسي","رونالدو"], a: "الافضل في التاريخ 🐐🔥" },
{ q: ["هالاند"], a: "مهاجم مرعب ⚡" },
{ q: ["الأهلي"], a: "نادي القرن 🔴" },
{ q: ["الزمالك"], a: "فريق عريق ⚪" },
{ q: ["الدوري الإنجليزي"], a: "اقوى دوري حالياً 🏆" }
];

// اختيار الصوت
function setVoice(type){
  selectedVoice = type;
  document.getElementById("overlay").style.display = "none";
}

// كتم الصوت
function toggleMute(){
  isMuted = !isMuted;
  document.getElementById("muteBtn").innerText = isMuted ? "🔇" : "🔊";
}

// تشغيل الصوت
function speak(text){
  if(isMuted || !selectedVoice) return;

  let speech = new SpeechSynthesisUtterance(text);
  speech.lang = "ar-EG";

  if(selectedVoice === "female"){
    speech.pitch = 1.5;
  } else {
    speech.pitch = 0.8;
  }

  window.speechSynthesis.speak(speech);
}

// الرد
function generateReply(msg){
  msg = msg.toLowerCase();

  for(let i=0;i<qa.length;i++){
    for(let j=0;j<qa[i].q.length;j++){
      if(msg.includes(qa[i].q[j])){
        return qa[i].a + "\n\nتحب اساعدك في اي حاجه تاني؟ ❤✔";
      }
    }
  }

  return "مش فاهمك 😅\n\nتحب اساعدك في اي حاجه تاني؟ ❤✔";
}

// إضافة رسالة
function add(text,type){
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 9999;
}

// إرسال
function send(){
  let input = document.getElementById("input");
  let msg = input.value.trim();
  if(!msg) return;

  add(msg,"user");
  input.value="";

  setTimeout(()=>{
    let reply = generateReply(msg);
    add(reply,"bot");
    speak(reply);
  },500);
}

// Enter
document.getElementById("input").addEventListener("keypress",function(e){
  if(e.key === "Enter"){
    send();
  }
});
</script>

</body>
</html>
