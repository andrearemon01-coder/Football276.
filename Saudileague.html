<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Table</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.table-box{
    width:90%;
    max-width:900px;
    background:#1e293b;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.table-title{
    background:#0ea5e9;
    padding:15px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#334155;
    padding:15px;
    font-size:16px;
}

td{
    padding:14px;
    text-align:center;
    border-bottom:1px solid #475569;
}

tr:hover{
    background:#273549;
    transition:0.3s;
}

.team{
    display:flex;
    align-items:center;
    gap:10px;
    justify-content:center;
}

.rank{
    font-weight:bold;
    color:#38bdf8;
}
</style>
</head>
