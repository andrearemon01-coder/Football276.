
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football 276 Elite</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#010814;
    color:white;
    overflow-x:hidden;
    padding-bottom:90px;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top left, rgba(34,197,94,0.08), transparent 30%),
    radial-gradient(circle at bottom right, rgba(59,130,246,0.08), transparent 30%);
    z-index:-1;
}

.header{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 20px;
    background:rgba(2,6,23,0.9);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.05);
    z-index:1000;
}

.logo{
    color:#22c55e;
    font-size:22px;
    font-weight:bold;
}

.header-links a{
    color:white;
    text-decoration:none;
    margin-left:15px;
    font-size:14px;
    transition:0.3s;
}

.header-links a:hover{
    color:#22c55e;
}

.hero{
    margin-top:70px;
    padding:70px 20px;
    text-align:center;
}

.hero h1{
    font-size:34px;
    margin-bottom:12px;
}

.hero p{
    color:#94a3b8;
    margin-bottom:25px;
}

.hero-btn{
    display:inline-block;
    background:#22c55e;
    color:white;
    text-decoration:none;
    padding:14px 28px;
    border-radius:14px;
    transition:0.3s;
}

.hero-btn:hover{
    transform:scale(1.05);
    background:#16a34a;
}

.section{
    padding:20px;
}

.section-title{
    font-size:24px;
    margin-bottom:20px;
    text-align:center;
}

.features{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
}

.feature-box{
    background:#0f172a;
    border-radius:18px;
    padding:20px;
    text-align:center;
    border:1px solid rgba(255,255,255,0.05);
    transition:0.3s;
}

.feature-box:hover{
    transform:translateY(-6px);
    border-color:#22c55e;
}

.feature-box span{
    display:block;
    font-size:35px;
    margin-bottom:10px;
}

.match-list{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.match-card{
    background:#0f172a;
    border-radius:18px;
    padding:18px;
    border:1px solid rgba(255,255,255,0.05);
}

.match-header{
    display:flex;
    justify-content:space-between;
    color:#94a3b8;
    margin-bottom:12px;
    font-size:13px;
}

.match-teams{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-weight:bold;
}

.result{
    background:#22c55e;
    color:#010814;
    padding:7px 14px;
    border-radius:10px;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    width:100%;
    background:#020617;
    display:flex;
    justify-content:space-around;
    padding:14px;
    border-top:1px solid rgba(255,255,255,0.05);
}

.bottom-nav a{
    color:white;
    text-decoration:none;
    font-size:12px;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">⚽ Football 276 Elite</div>

    <div class="header-links">
        <a href="#">News</a>
        <a href="#">Leagues</a>
        <a href="#">AI</a>
    </div>
</div>

<section class="hero">
    <h1>أفضل تجربة كرة قدم</h1>
    <p>نتائج مباشرة - أخبار - مباريات عالمية</p>
    <a href="Matches.html" class="hero-btn">ابدأ المشاهدة</a>
</section>

<section class="section">
    <h2 class="section-title">خدمات الموقع</h2>

    <div class="features">
        <div class="feature-box">
            <span>⚽</span>
            مباريات
        </div>

        <div class="feature-box">
            <span>📰</span>
            أخبار
        </div>

        <div class="feature-box">
            <span>🏆</span>
            دوريات
        </div>

        <div class="feature-box">
            <span>🤖</span>
            AI
        </div>
    </div>
</section>

<section class="section">
    <h2 class="section-title">مباريات اليوم</h2>

    <div class="match-list">
        <div class="match-card">
            <div class="match-header">
                <span>Premier League</span>
                <span>Today</span>
            </div>

            <div class="match-teams">
                <span>Arsenal</span>
                <span class="result">1 - 0</span>
                <span>Tottenham</span>
            </div>
        </div>

        <div class="match-card">
            <div class="match-header">
                <span>Serie A</span>
                <span>Today</span>
            </div>

            <div class="match-teams">
                <span>Milan</span>
                <span class="result">2 - 2</span>
                <span>Inter</span>
            </div>
        </div>
    </div>
</section>

<div class="bottom-nav">
    <a href="Home.html">Home</a>
    <a href="News.html">News</a>
    <a href="Settings.html">Settings</a>
    <a href="More Settings.html">More settings...</a>
</div>

</body>
</html>

     crossorigin="anonymous"></script>
